[build]
  functions = "netlify/functions"
  publish = "."

[functions."*"]
  external_node_modules = ["@netlify/blobs"]

[[redirects]]
  from = "/api/submit-ballot"
  to = "/.netlify/functions/submit-ballot"
  status = 200

[[redirects]]
  from = "/api/get-ballots"
  to = "/.netlify/functions/get-ballots"
  status = 200
