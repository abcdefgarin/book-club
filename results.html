<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Results · Booker Prize Book Club</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F7F3EC;
  --ink: #1A1612;
  --warm-gray: #8C847A;
  --gold: #C49A3C;
  --rust: #A8432A;
  --border: #D6CFC4;
  --sand: #EDE8DF;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--cream); color:var(--ink); font-family:'DM Sans',sans-serif; font-weight:300; line-height:1.6; min-height:100vh; }

/* ── Banner ── */
header {
  border-bottom:2px solid var(--ink);
  padding:1.75rem 4rem 0;
}
.header-eyebrow { font-family:'DM Mono',monospace; font-size:.68rem; letter-spacing:.2em; text-transform:uppercase; color:var(--warm-gray); margin-bottom:.4rem; }
h1 { font-family:'Playfair Display',serif; font-size:clamp(1.6rem,3vw,2.4rem); font-weight:400; line-height:1.1; margin-bottom:1.5rem; }
h1 em { font-style:italic; color:var(--rust); }

nav {
  border-top:1px solid var(--border);
  padding:.75rem 0;
  display:flex; align-items:center; gap:0;
}
.nav-back {
  font-family:'DM Mono',monospace; font-size:.66rem; letter-spacing:.12em; text-transform:uppercase;
  color:var(--warm-gray); text-decoration:none;
  border:1px solid var(--border); padding:.42rem 1.1rem;
  transition:color .15s, background .15s;
}
.nav-back:hover { color:var(--ink); background:var(--sand); }
.nav-refresh {
  font-family:'DM Mono',monospace; font-size:.66rem; letter-spacing:.12em; text-transform:uppercase;
  color:var(--warm-gray); background:none;
  border:1px solid var(--border); border-left:none; padding:.42rem 1.1rem;
  cursor:pointer; transition:color .15s, background .15s;
}
.nav-refresh:hover { color:var(--ink); background:var(--sand); }
.nav-status { font-family:'DM Mono',monospace; font-size:.62rem; color:var(--warm-gray); margin-left:auto; letter-spacing:.08em; }

/* ── Layout ── */
main {
  display:grid;
  grid-template-columns:1fr 340px;
  gap:0;
  min-height:calc(100vh - 140px);
}

/* ── Left: tally ── */
.tally-panel { border-right:1px solid var(--border); padding:2.5rem 4rem; }
.panel-heading {
  font-family:'DM Mono',monospace; font-size:.62rem; letter-spacing:.18em; text-transform:uppercase;
  color:var(--warm-gray); border-bottom:1px solid var(--border); padding-bottom:.6rem; margin-bottom:1.5rem;
  display:flex; justify-content:space-between; align-items:baseline;
}
.panel-heading em { color:var(--gold); font-style:normal; font-size:.8rem; font-family:'DM Sans',sans-serif; }

.tally-empty { font-size:.88rem; color:var(--warm-gray); font-style:italic; padding:2rem 0; }

.tally-row {
  display:grid;
  grid-template-columns:2rem 1fr auto;
  gap:.75rem 1.25rem;
  align-items:center;
  padding:.9rem 0;
  border-bottom:1px dotted var(--border);
}
.tally-row:last-child { border-bottom:none; }

.tally-rank {
  font-family:'Playfair Display',serif;
  font-size:1.5rem; color:var(--border); text-align:center; line-height:1;
}
.tally-row:nth-child(1) .tally-rank { color:var(--gold); }
.tally-row:nth-child(2) .tally-rank { color:var(--warm-gray); }
.tally-row:nth-child(3) .tally-rank { color:#A0896E; }

.tally-info { min-width:0; }
.tally-title { font-family:'Playfair Display',serif; font-style:italic; font-size:.98rem; line-height:1.3; }
.tally-author { font-size:.75rem; color:var(--warm-gray); margin-top:.1rem; }

.tally-score {
  text-align:right;
}
.tally-points {
  font-family:'DM Mono',monospace; font-size:.75rem; color:var(--ink);
  display:block;
}
.tally-mentions {
  font-family:'DM Mono',monospace; font-size:.58rem; color:var(--warm-gray);
  display:block; margin-top:.1rem;
}

/* Bar chart under title */
.tally-bar-wrap { margin-top:.4rem; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
.tally-bar { height:100%; background:var(--gold); border-radius:2px; transition:width .6s ease; }

/* ── Right: individual ballots ── */
.ballots-panel { padding:2.5rem 2rem; overflow-y:auto; background:var(--sand); }

.ballot-card {
  background:white; border:1px solid var(--border);
  padding:1.25rem; margin-bottom:1rem;
}
.ballot-card-header {
  display:flex; justify-content:space-between; align-items:baseline;
  margin-bottom:.85rem; padding-bottom:.6rem; border-bottom:1px solid var(--border);
}
.ballot-card-name { font-family:'Playfair Display',serif; font-size:1rem; font-style:italic; }
.ballot-card-time { font-family:'DM Mono',monospace; font-size:.55rem; color:var(--warm-gray); letter-spacing:.06em; }

.ballot-selection {
  display:flex; gap:.75rem; align-items:baseline;
  padding:.28rem 0; border-bottom:1px dotted var(--border); font-size:.82rem;
}
.ballot-selection:last-child { border-bottom:none; }
.ballot-sel-rank {
  font-family:'DM Mono',monospace; font-size:.65rem; color:var(--warm-gray);
  flex-shrink:0; width:1.6rem;
}
.ballot-sel-title { font-family:'Playfair Display',serif; font-style:italic; }

.ballots-empty { font-size:.85rem; color:var(--warm-gray); font-style:italic; padding:1rem 0; }

/* ── Loading / error states ── */
#loading {
  display:flex; align-items:center; justify-content:center;
  min-height:40vh; font-family:'DM Mono',monospace; font-size:.7rem;
  letter-spacing:.15em; text-transform:uppercase; color:var(--warm-gray);
}
.spinner {
  width:18px; height:18px; border:2px solid var(--border);
  border-top-color:var(--ink); border-radius:50%;
  animation:spin .7s linear infinite; margin-right:.75rem;
}
@keyframes spin { to { transform:rotate(360deg); } }

#error-msg {
  display:none; padding:2rem 4rem;
  font-size:.85rem; color:var(--rust);
}

footer { padding:.85rem 4rem; font-family:'DM Mono',monospace; font-size:.6rem; color:var(--warm-gray); letter-spacing:.08em; display:flex; justify-content:space-between; border-top:1px solid var(--border); }

@media(max-width:860px) {
  header { padding-left:1.5rem; padding-right:1.5rem; }
  main { grid-template-columns:1fr; }
  .tally-panel { padding:2rem 1.5rem; border-right:none; border-bottom:1px solid var(--border); }
  .ballots-panel { padding:2rem 1.5rem; }
  footer { padding-left:1.5rem; padding-right:1.5rem; }
}
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">Book Club · Results</div>
  <h1>Shortlists <em>2020–2024</em></h1>
  <nav>
    <a class="nav-back" href="/">← Back to voting</a>
    <button class="nav-refresh" onclick="load()">↻ Refresh</button>
    <span class="nav-status" id="nav-status"></span>
  </nav>
</header>

<div id="loading"><div class="spinner"></div>Loading results…</div>
<div id="error-msg">Couldn't load results. Try refreshing.</div>

<main id="main-content" style="display:none;">
  <div class="tally-panel">
    <div class="panel-heading">
      Aggregate Tally
      <em id="ballot-count"></em>
    </div>
    <div id="tally-list"></div>
  </div>
  <div class="ballots-panel">
    <div class="panel-heading" style="border-bottom:1px solid var(--border);padding-bottom:.6rem;margin-bottom:1.25rem;">
      Individual Ballots
    </div>
    <div id="ballot-list"></div>
  </div>
</main>

<footer>
  <span>Booker Prize Shortlists 2020–2024</span>
  <span>Results · Auto-tallied</span>
</footer>

<script>
function fmt(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
}

async function load() {
  document.getElementById('loading').style.display    = 'flex';
  document.getElementById('main-content').style.display = 'none';
  document.getElementById('error-msg').style.display  = 'none';
  document.getElementById('nav-status').textContent   = '';

  let data;
  try {
    const res = await fetch('/api/get-ballots');
    if (!res.ok) throw new Error(res.statusText);
    data = await res.json();
  } catch (e) {
    document.getElementById('loading').style.display   = 'none';
    document.getElementById('error-msg').style.display = 'block';
    return;
  }

  const { ballots, aggregate } = data;

  // ── Tally panel ──────────────────────────────────────────────
  const tallyList = document.getElementById('tally-list');
  const count = document.getElementById('ballot-count');
  count.textContent = `${ballots.length} ballot${ballots.length !== 1 ? 's' : ''} submitted`;

  if (aggregate.length === 0) {
    tallyList.innerHTML = '<div class="tally-empty">No votes yet — check back soon.</div>';
  } else {
    const maxPoints = aggregate[0].points;
    tallyList.innerHTML = aggregate.map((item, i) => `
      <div class="tally-row">
        <span class="tally-rank">${i + 1}</span>
        <div class="tally-info">
          <div class="tally-title">${item.title}</div>
          <div class="tally-author">${item.author}</div>
          <div class="tally-bar-wrap">
            <div class="tally-bar" style="width:${Math.round((item.points / maxPoints) * 100)}%"></div>
          </div>
        </div>
        <div class="tally-score">
          <span class="tally-points">${item.points} pts</span>
          <span class="tally-mentions">${item.mentions} vote${item.mentions !== 1 ? 's' : ''}</span>
        </div>
      </div>
    `).join('');
  }

  // ── Individual ballots panel ──────────────────────────────────
  const ballotList = document.getElementById('ballot-list');
  if (ballots.length === 0) {
    ballotList.innerHTML = '<div class="ballots-empty">No ballots yet.</div>';
  } else {
    // Most recent first
    const sorted = [...ballots].sort((a,b) => new Date(b.submittedAt) - new Date(a.submittedAt));
    ballotList.innerHTML = sorted.map(ballot => `
      <div class="ballot-card">
        <div class="ballot-card-header">
          <span class="ballot-card-name">${ballot.name}</span>
          <span class="ballot-card-time">${fmt(ballot.submittedAt)}</span>
        </div>
        ${ballot.selections.map(s => `
          <div class="ballot-selection">
            <span class="ballot-sel-rank">#${s.rank}</span>
            <span class="ballot-sel-title">${s.title}</span>
          </div>
        `).join('')}
      </div>
    `).join('');
  }

  document.getElementById('loading').style.display      = 'none';
  document.getElementById('main-content').style.display = 'grid';
  document.getElementById('nav-status').textContent     = `Updated ${fmt(new Date().toISOString())}`;
}

load();
</script>
</body>
</html>
